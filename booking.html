<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (!localStorage.getItem("user") || !localStorage.getItem("token")) {
            window.location.href = "index.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | The Royal Crest</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Montserrat', sans-serif;
        }

        .booking-container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #c8a96a;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #b28b4d;
        }
    </style>

</head>

<body>

    <div class="booking-container">

        <h2>Book Your Luxury Stay</h2>

        <form id="bookingForm">

            <input type="text" id="name" placeholder="Full Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <input type="tel" id="phone" placeholder="Phone Number" required>

            <label>Check In</label>

            <input type="date" id="checkin" required>

            <label>Check Out</label>

            <input type="date" id="checkout" required>

            <select id="room" name="room" required>
                <option value="">Select Your Room</option>
                <option value="Royal Elite Room">Royal Elite Room</option>
                <option value="Ocean Pearl Suite">Ocean Pearl Suite</option>
                <option value="Imperial Presidential Palace">Imperial Presidential Palace</option>
                <option value="Family Paradise Villa">Family Paradise Villa</option>
                <option value="Eternal Romance Suite">Eternal Romance Suite</option>
                <option value="Skyline Executive Residence">Skyline Executive Residence</option>
            </select>

            <input type="number" id="guests" placeholder="Guests" required>

            <select id="paymentMethod" required>
                <option value="">Select Payment Method</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
                <option value="Cash On Arrival">Cash On Arrival</option>
            </select>

            <textarea id="message" placeholder="Special Requests"></textarea>

            <button type="submit">
                Confirm Booking
            </button>

        </form>

    </div>

    <!-- Dummy Payment Modal -->
    <div id="paymentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:15px; text-align:center; width:400px; box-shadow:0 15px 35px rgba(0,0,0,0.4);">
            <div id="paymentSpinner" style="display:block;">
                <h3 style="margin-bottom:20px; color:#c8a96a; font-family:'Montserrat', sans-serif;">Processing Payment...</h3>
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #c8a96a; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
            <div id="paymentSuccess" style="display:none;">
                <div style="font-size: 60px; color: #2ecc71; margin-bottom:15px;">✅</div>
                <h3 style="color:#2ecc71; margin-bottom:10px; font-family:'Montserrat', sans-serif;">Payment Successful!</h3>
                <p style="font-family:'Montserrat', sans-serif; color:#555;">Generating your receipt...</p>
            </div>
        </div>
    </div>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="JS/booking.js"></script>
</body>
</html>
