<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | The Royal Crest</title>

    <link rel="stylesheet" href="CSS/style.css">

    <style>
        body{
            background:#f5f5f5;
            font-family:Arial,Helvetica,sans-serif;
        }

        .booking-container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:14px;
            background:#c8a96a;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#b28b4d;
        }
    </style>

</head>
<body>

<div class="booking-container">

<h2>Book Your Luxury Stay</h2>

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<label>Check In</label>

<input
type="date"
id="checkin"
required>

<label>Check Out</label>

<input
type="date"
id="checkout"
required>

<select id="room" name="room" required>
    <option value="">Select Your Room</option>
    <option value="Royal Elite Room">Royal Elite Room</option>
    <option value="Deluxe Ocean Suite">Deluxe Ocean Suite</option>
    <option value="Presidential Suite">Presidential Suite</option>
    <option value="Family Luxury Room">Family Luxury Room</option>
    <option value="Honeymoon Suite">Honeymoon Suite</option>
    <option value="Executive Business Suite">Executive Business Suite</option>
</select>

<input
type="number"
id="guests"
placeholder="Guests"
required>

<textarea
id="message"
placeholder="Special Requests"></textarea>

<button type="submit">

Confirm Booking

</button>

</form>

</div>
<script src="JS/booking.js"></script>
</body>
</html>
