<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (localStorage.getItem("user") && localStorage.getItem("token")) {
            window.location.href = "home.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Crest</title>

    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

<div class="auth-container">

    <!-- LOGIN SIDE -->
    <div class="login-box form-box active" id="loginBox">
        <h1>The Royal Crest</h1>
        <p>Welcome Back to Luxury</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="auth-btn">
                <span>Login</span>
            </button>
        </form>

        <div class="toggle-text">
            Don't have an account? <a href="#" onclick="toggleAuthView('register')">Sign up</a>
        </div>
    </div>

    <!-- REGISTER SIDE -->
    <div class="register-box form-box" id="registerBox">
        <h2>Create Account</h2>
        <p>Join our exclusive membership</p>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="registerEmail" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <input type="password" id="registerPassword" placeholder="Password" required>
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="auth-btn">
                <span>Create Account</span>
            </button>
        </form>

        <div class="toggle-text">
            Already have an account? <a href="#" onclick="toggleAuthView('login')">Log in</a>
        </div>
    </div>

</div>

<script>
    function toggleAuthView(view) {
        const loginBox = document.getElementById('loginBox');
        const registerBox = document.getElementById('registerBox');

        if (view === 'register') {
            loginBox.classList.remove('active');
            registerBox.classList.add('active');
        } else {
            registerBox.classList.remove('active');
            loginBox.classList.add('active');
        }
    }
</script>

<script src="JS/login.js"></script>
<script src="JS/register.js"></script>

</body>
</html>
