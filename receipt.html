<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Receipt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.receipt{
    width:650px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#c8a96a;
    margin-bottom:10px;
}

h3{
    text-align:center;
    margin-bottom:30px;
    color:green;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #ddd;
}

.label{
    font-weight:bold;
}

button{
    width:100%;
    padding:15px;
    margin-top:30px;
    border:none;
    border-radius:10px;
    background:#c8a96a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="receipt">

<h1>The Royal Crest</h1>

<h3>✅ Booking Confirmed</h3>

<div class="row">
    <span class="label">Booking ID</span>
    <span id="bookingId"></span>
</div>

<div class="row">
    <span class="label">Guest Name</span>
    <span id="guestName"></span>
</div>

<div class="row">
    <span class="label">Email</span>
    <span id="email"></span>
</div>

<div class="row">
    <span class="label">Phone</span>
    <span id="phone"></span>
</div>

<div class="row">
    <span class="label">Room</span>
    <span id="room"></span>
</div>

<div class="row">
    <span class="label">Check In</span>
    <span id="checkIn"></span>
</div>

<div class="row">
    <span class="label">Check Out</span>
    <span id="checkOut"></span>
</div>

<div class="row">
    <span class="label">Guests</span>
    <span id="guests"></span>
</div>

<div class="row">
    <span class="label">Status</span>
    <span>Confirmed ✅</span>
</div>

<button onclick="window.location.href='home.html'">
    Back To Home
</button>

</div>

<script>

const receipt =
JSON.parse(localStorage.getItem("bookingReceipt"));

document.getElementById("bookingId").innerText =
receipt.bookingId;

document.getElementById("guestName").innerText =
receipt.guestName;

document.getElementById("email").innerText =
receipt.email;

document.getElementById("phone").innerText =
receipt.phone;

document.getElementById("room").innerText =
receipt.roomType;

document.getElementById("checkIn").innerText =
receipt.checkInDate;

document.getElementById("checkOut").innerText =
receipt.checkOutDate;

document.getElementById("guests").innerText =
receipt.totalGuests;

</script>

</body>
</html>
