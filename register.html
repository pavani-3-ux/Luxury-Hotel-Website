<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Royal Crest</title>

    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="register-container">

    <h2>Create Account</h2>

    <form id="registerForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">
            Login
        </a>
    </p>

</div>

<script src="js/register.js"></script>

</body>
</html>
